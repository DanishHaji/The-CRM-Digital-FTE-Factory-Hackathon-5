apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: digital-fte-api-hpa
  namespace: digital-fte
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: digital-fte-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 50  # Scale down max 50% of pods at a time
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0  # Scale up immediately
      policies:
      - type: Percent
        value: 100  # Double pods if needed
        periodSeconds: 15
      - type: Pods
        value: 4  # Or add 4 pods at a time
        periodSeconds: 15
      selectPolicy: Max  # Use whichever policy adds more pods
