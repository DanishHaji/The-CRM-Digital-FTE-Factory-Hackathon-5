apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-fte-api
  namespace: digital-fte
  labels:
    app: digital-fte-api
    component: backend
spec:
  replicas: 3  # Minimum replicas, HPA will scale up
  selector:
    matchLabels:
      app: digital-fte-api
  template:
    metadata:
      labels:
        app: digital-fte-api
        component: backend
    spec:
      serviceAccountName: digital-fte-sa
      containers:
      - name: api
        image: your-registry/digital-fte-api:latest  # Change to your registry
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        # Database configuration
        - name: DATABASE_URL
          value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: password
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: database
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: digital-fte-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: digital-fte-config
              key: POSTGRES_PORT

        # Groq AI configuration
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: groq-credentials
              key: api-key
        - name: GROQ_MODEL
          valueFrom:
            configMapKeyRef:
              name: digital-fte-config
              key: GROQ_MODEL
        - name: AI_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: digital-fte-config
              key: AI_PROVIDER

        # Twilio WhatsApp configuration
        - name: TWILIO_ACCOUNT_SID
          valueFrom:
            secretKeyRef:
              name: twilio-credentials
              key: account-sid
        - name: TWILIO_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: twilio-credentials
              key: auth-token
        - name: TWILIO_WHATSAPP_NUMBER
          valueFrom:
            secretKeyRef:
              name: twilio-credentials
              key: whatsapp-number

        # Application configuration
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: digital-fte-config
              key: APP_ENV
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: digital-fte-config
              key: LOG_LEVEL
        - name: DEBUG
          valueFrom:
            configMapKeyRef:
              name: digital-fte-config
              key: DEBUG

        # Kubernetes metadata
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        livenessProbe:
          httpGet:
            path: /health/liveness
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: false  # FastAPI needs to write temp files
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL

      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: digital-fte-api
  namespace: digital-fte
  labels:
    app: digital-fte-api
spec:
  selector:
    app: digital-fte-api
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  type: LoadBalancer  # Or ClusterIP if using Ingress
