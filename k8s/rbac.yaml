apiVersion: v1
kind: ServiceAccount
metadata:
  name: digital-fte-sa
  namespace: digital-fte
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: digital-fte-role
  namespace: digital-fte
rules:
# Read-only access to pods and services (for health checks, debugging)
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list", "watch"]

# No access to secrets (secrets are injected via env vars)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: digital-fte-rolebinding
  namespace: digital-fte
subjects:
- kind: ServiceAccount
  name: digital-fte-sa
  namespace: digital-fte
roleRef:
  kind: Role
  name: digital-fte-role
  apiGroup: rbac.authorization.k8s.io
