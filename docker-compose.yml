services:
  # PostgreSQL 16 with pgvector extension
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: digital-fte-postgres
    environment:
      POSTGRES_DB: digital_fte
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper (required for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: digital-fte-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # Kafka broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: digital-fte-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # FastAPI backend service
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digital-fte-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres_dev_password@postgres:5432/digital_fte
      KAFKA_BROKER: kafka:9093
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
      - ./credentials:/app/credentials
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  # Message processor workers
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres_dev_password@postgres:5432/digital_fte
      KAFKA_BROKER: kafka:9093
      KAFKA_CONSUMER_GROUP: digital-fte-workers
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
      - ./credentials:/app/credentials
    command: python -m src.workers.message_processor
    deploy:
      replicas: 3

  # Next.js frontend (Web Support Form)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: digital-fte-frontend
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
